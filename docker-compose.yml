services:
  ctrader-token-service:
    # Централизованный OAuth refresh-сервис: один источник истины
    # для cTrader access/refresh токенов между Advisor и fx-ai-trader.
    # Решает rotation conflict (cTrader refresh_token = single-use; два
    # бота независимо refresh-ят → один получает Access denied).
    # См. src/ctrader_token_service/__init__.py для архитектуры.
    build:
      context: .
      dockerfile: Dockerfile.ctrader-token-service
    image: ctrader-token-service:local
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    env_file:
      - .env
    environment:
      CTRADER_CLIENT_ID: ${CTRADER_CLIENT_ID:-}
      CTRADER_CLIENT_SECRET: ${CTRADER_CLIENT_SECRET:-}
      CTRADER_TOKEN_SERVICE_SECRET: ${CTRADER_TOKEN_SERVICE_SECRET:-}
      CTRADER_TOKEN_SERVICE_TOKEN_PATH: ${CTRADER_TOKEN_SERVICE_TOKEN_PATH:-/data/ctrader_tokens.json}
      CTRADER_TOKEN_SERVICE_HOST: 0.0.0.0
      CTRADER_TOKEN_SERVICE_PORT: 8080
      CTRADER_TOKEN_SERVICE_LOG_LEVEL: ${CTRADER_TOKEN_SERVICE_LOG_LEVEL:-INFO}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Advisor (fx_pro_bot) — rule-based ensemble: Leaders, Outsiders,
  # Shadow, GoldORB, SqueezeH4, TurtleH4, GBPJPYFade, COT, sentiment,
  # paper exit-strategies. История 2386 закрытых сделок.
  #
  # 2026-05-22: ОТКЛЮЧЁН по решению пользователя. Статистика с 2026-04-07
  # (n=2386, 6 недель, p<0.05 на всех stat-significant выборках):
  # - atr_spike (n=840): WR 43%, net −951 pips, avg −1.13
  # - orb_breakout (n=477): WR 49%, net −347 pips, avg −0.73
  # - news_fade (n=450): WR **21%**, net −3676 pips, avg −8.17 ← худшая
  # - gold_orb_breakout (n=83): WR 45%, net +185 pips, avg +2.23
  #   (плюсовая, но n<100 — ниже порога sample-size.mdc)
  # - vwap_deviation, extreme_bb: n=45/40, ниже порога
  #
  # Решение: советник проигрывает на большой выборке. Открытая GC=F
  # SHORT (broker_pid=150934973, opened 22.05 10:49 UTC) оставлена
  # висеть на брокере, broker SL/TP или manual close в cTrader app
  # её закроет. label='advisor' → fx-ai-trader её не закроет
  # (broker-side isolation сохранена).
  #
  # Код советника не удалён. Чтобы вернуть: убрать profiles или запустить
  # `docker compose --profile disabled up -d advisor`.
  #
  # Историческая запись возврата 2026-05-20 и убийства fx_ai_trend —
  # см. BUILDLOG.md и BUILDLOG_AI_FX_TRADER.md.
  advisor:
    profiles:
      - disabled
    build: .
    image: fx-pro-bot:local
    restart: unless-stopped
    depends_on:
      ctrader-token-service:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      CTRADER_TOKEN_SERVICE_URL: ${CTRADER_TOKEN_SERVICE_URL:-http://ctrader-token-service:8080}
      CTRADER_TOKEN_SERVICE_SECRET: ${CTRADER_TOKEN_SERVICE_SECRET:-}
      YFINANCE_INTERVAL: ${YFINANCE_INTERVAL:-5m}
      YFINANCE_PERIOD: ${YFINANCE_PERIOD:-1mo}
      POLL_INTERVAL_SEC: ${POLL_INTERVAL_SEC:-300}
      VERIFY_HORIZONS: ${VERIFY_HORIZONS:-15,30,60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FXPRO_ENABLED: ${FXPRO_ENABLED:-false}
      FXPRO_CLIENT_ID: ${FXPRO_CLIENT_ID:-}
      FXPRO_CLIENT_SECRET: ${FXPRO_CLIENT_SECRET:-}
      FXPRO_ACCOUNT_ID: ${FXPRO_ACCOUNT_ID:-}
      FXPRO_API_URL: ${FXPRO_API_URL:-https://connect.fxpro.com/api/v1}
      CTRADER_TRADING_ENABLED: ${CTRADER_TRADING_ENABLED:-false}
      CTRADER_HOST_TYPE: ${CTRADER_HOST_TYPE:-demo}
      CTRADER_CLIENT_ID: ${CTRADER_CLIENT_ID:-}
      CTRADER_CLIENT_SECRET: ${CTRADER_CLIENT_SECRET:-}
      CTRADER_ACCOUNT_ID: ${CTRADER_ACCOUNT_ID:-0}
      CTRADER_REDIRECT_URI: ${CTRADER_REDIRECT_URI:-https://openapi.ctrader.com/apps/token}
      OUTSIDERS_MODE: ${OUTSIDERS_MODE:-confirmed}
      LEADERS_ENABLED: ${LEADERS_ENABLED:-true}
      OUTSIDERS_ENABLED: ${OUTSIDERS_ENABLED:-true}
      ENSEMBLE_ENABLED: ${ENSEMBLE_ENABLED:-true}
      SCALPING_GOLD_ORB_ENABLED: ${SCALPING_GOLD_ORB_ENABLED:-true}
      SCALPING_GOLD_ORB_SHADOW: ${SCALPING_GOLD_ORB_SHADOW:-true}
      SCALPING_GOLD_ORB_H2_REGIME_FILTER: ${SCALPING_GOLD_ORB_H2_REGIME_FILTER:-false}
      SCALPING_GOLD_ORB_H5_SWEEP_FILTER: ${SCALPING_GOLD_ORB_H5_SWEEP_FILTER:-true}
      SCALPING_MAX_POSITIONS: ${SCALPING_MAX_POSITIONS:-50}
      KILLSWITCH_MAX_DAILY_LOSS: ${KILLSWITCH_MAX_DAILY_LOSS:-50.0}
      KILLSWITCH_MAX_DRAWDOWN_PCT: ${KILLSWITCH_MAX_DRAWDOWN_PCT:-20.0}
      KILLSWITCH_MAX_POSITIONS: ${KILLSWITCH_MAX_POSITIONS:-10}
      KILLSWITCH_MAX_LOSS_PER_TRADE: ${KILLSWITCH_MAX_LOSS_PER_TRADE:-25.0}
    volumes:
      - ./data:/data

  ai-trader:
    build:
      context: .
      dockerfile: Dockerfile.ai-trader
    image: ai-trader:local
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    env_file:
      - .env
    environment:
      AI_TRADER_DATA_DIR: /data
      AI_TRADER_LOG_LEVEL: ${AI_TRADER_LOG_LEVEL:-INFO}
      # Эксперимент 14 дней. ВСЕ параметры заморожены — менять = curve-fitting.
      AI_TRADER_POLL_INTERVAL_SEC: ${AI_TRADER_POLL_INTERVAL_SEC:-900}
      AI_TRADER_VIRTUAL_CAPITAL: ${AI_TRADER_VIRTUAL_CAPITAL:-500}
      # 2026-05-20: whitelist пар обновлён по результатам 30д API stats.
      # SYSTEM_PROMPT теперь template-driven — список монет берётся из
      # settings.symbols (build_system_prompt(settings)), single source
      # of truth = .env (AI_TRADER_SYMBOLS). Fallback ниже совпадает с
      # текущим .env.
      AI_TRADER_SYMBOLS: ${AI_TRADER_SYMBOLS:-LTCUSDT,ATOMUSDT,BTCUSDT,SUIUSDT,LINKUSDT}
      # Killswitch (v0.3, 2%-риск): согласно AUDIT_2026.md P1, переход на
      # mainstream 2026 risk per trade 1–2% (KuCoin Risk Mgmt 2026, Atlas Peak
      # Research, Hyper-Quant). При 2% риска = $10 макс на сделку × 5 = $50/день.
      # Total $200 = 40% virtual capital, ранняя остановка эксперимента.
      AI_TRADER_MAX_DAILY_LOSS: ${AI_TRADER_MAX_DAILY_LOSS:-50}
      AI_TRADER_MAX_TOTAL_LOSS: ${AI_TRADER_MAX_TOTAL_LOSS:-200}
      AI_TRADER_MAX_POSITIONS: ${AI_TRADER_MAX_POSITIONS:-3}
      AI_TRADER_MAX_LEVERAGE: ${AI_TRADER_MAX_LEVERAGE:-5}
      AI_TRADER_RISK_PER_TRADE: ${AI_TRADER_RISK_PER_TRADE:-0.02}
      # Bybit — ОТДЕЛЬНЫЕ ключи от bybit-bot (см. .env: AI_TRADER_BYBIT_API_KEY).
      # Можно использовать те же что у bybit-bot, но рекомендуется завести
      # отдельные subaccount или хотя бы переменные с другим именем для аудита.
      AI_TRADER_BYBIT_DEMO: ${AI_TRADER_BYBIT_DEMO:-true}
      AI_TRADER_BYBIT_CATEGORY: ${AI_TRADER_BYBIT_CATEGORY:-linear}
      # DeepSeek-V4 через Anthropic-compatible endpoint.
      # Free tier даёт 5M входных + 5M выходных tokens.
      AI_TRADER_DEEPSEEK_MODEL: ${AI_TRADER_DEEPSEEK_MODEL:-deepseek-v4-flash}
      AI_TRADER_DEEPSEEK_BASE_URL: ${AI_TRADER_DEEPSEEK_BASE_URL:-https://api.deepseek.com/anthropic}
      AI_TRADER_DEEPSEEK_THINKING: ${AI_TRADER_DEEPSEEK_THINKING:-true}
      # 4096 чтобы thinking-блоки не съедали весь бюджет до пустого
      # text (см. BUILDLOG_AI_TRADER 2026-05-06 «fix(empty response)»).
      AI_TRADER_DEEPSEEK_MAX_TOKENS: ${AI_TRADER_DEEPSEEK_MAX_TOKENS:-4096}
      # PAPER mode по умолчанию: ставки НЕ ставятся на биржу, только логируются.
      # Включать в LIVE только после проверки первых 1-2 циклов под наблюдением.
      AI_TRADER_TRADING_ENABLED: ${AI_TRADER_TRADING_ENABLED:-false}
      # News (Wave 3): RSS-агрегатор CoinDesk/CoinTelegraph/Decrypt, без auth.
      # Кэш в памяти 10 мин, фильтр по символам (см. SYMBOL_KEYWORDS в
      # src/ai_trader/news/rss.py) + generic-keywords (ETF, Fed, regulation).
      # Top-N свежих за last_age_hours.
      AI_TRADER_NEWS_ENABLED: ${AI_TRADER_NEWS_ENABLED:-true}
      AI_TRADER_NEWS_MAX_AGE_HOURS: ${AI_TRADER_NEWS_MAX_AGE_HOURS:-6}
      AI_TRADER_NEWS_MAX_ITEMS: ${AI_TRADER_NEWS_MAX_ITEMS:-8}
      # Telegram (Wave 4): если TELEGRAM_BOT_TOKEN пустой — TG-модуль молчит.
      # TELEGRAM_CHAT_ID опционален (auto-detect при первой команде /start),
      # но если задан — отключает auto-bind для безопасности.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      AI_TRADER_TELEGRAM_ENABLED: ${AI_TRADER_TELEGRAM_ENABLED:-true}
    volumes:
      - ai_trader_data:/data

  fx-ai-trader:
    build:
      context: .
      dockerfile: Dockerfile.fx-ai-trader
    image: fx-ai-trader:local
    restart: unless-stopped
    depends_on:
      ctrader-token-service:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    env_file:
      - .env
    environment:
      AI_FX_TRADER_DATA_DIR: /data
      CTRADER_TOKEN_SERVICE_URL: ${CTRADER_TOKEN_SERVICE_URL:-http://ctrader-token-service:8080}
      CTRADER_TOKEN_SERVICE_SECRET: ${CTRADER_TOKEN_SERVICE_SECRET:-}
      AI_FX_TRADER_LOG_LEVEL: ${AI_FX_TRADER_LOG_LEVEL:-INFO}
      # Phase 1: paper-mode минимум 14 дней. Trading_enabled=false по умолчанию
      # (research: NexusTrade 2026 «30–90 days paper before live»; Kiploks
      # «weeks not hours»). Включать LIVE только после подтверждённой
      # стабильности парсера, sentiment-uncertainty calibration и ≥30 paper-trades.
      AI_FX_TRADER_TRADING_ENABLED: ${AI_FX_TRADER_TRADING_ENABLED:-false}
      # 2026-05-18: добавлен NG=F (NAT.GAS, NYMEX Henry Hub). Research
      # & verification — см. prompts.py v1.1, scripts/fx_ai_scout_gas_symbols.py.
      AI_FX_TRADER_SYMBOLS: ${AI_FX_TRADER_SYMBOLS:-XAUUSD,BZ=F,NG=F}
      AI_FX_TRADER_ORDER_LABEL: ${AI_FX_TRADER_ORDER_LABEL:-ai-fx-trader}
      AI_FX_TRADER_POLL_INTERVAL_SEC: ${AI_FX_TRADER_POLL_INTERVAL_SEC:-900}
      AI_FX_TRADER_REVIEW_INTERVAL_SEC: ${AI_FX_TRADER_REVIEW_INTERVAL_SEC:-300}
      AI_FX_TRADER_VIRTUAL_CAPITAL: ${AI_FX_TRADER_VIRTUAL_CAPITAL:-500}
      # KillSwitch v1.0 (broker-safety only): R:R/risk/correlation сняты —
      # LLM решает сам как discretionary trader. Остались catastrophic
      # loss caps + broker margin safety.
      AI_FX_TRADER_MAX_DAILY_LOSS: ${AI_FX_TRADER_MAX_DAILY_LOSS:-150}
      AI_FX_TRADER_MAX_TOTAL_LOSS: ${AI_FX_TRADER_MAX_TOTAL_LOSS:-300}
      AI_FX_TRADER_MAX_POSITIONS: ${AI_FX_TRADER_MAX_POSITIONS:-3}
      AI_FX_TRADER_MAX_POSITIONS_PER_SYMBOL: ${AI_FX_TRADER_MAX_POSITIONS_PER_SYMBOL:-3}
      AI_FX_TRADER_MAX_LOT_SIZE: ${AI_FX_TRADER_MAX_LOT_SIZE:-0.50}
      # cTrader OAuth: те же creds что у Advisor (один demo-аккаунт).
      # Single source of truth — ctrader-token-service (см. сервис выше).
      # AI_FX_TRADER_CTRADER_TOKEN_PATH остаётся только как **fallback**
      # путь когда CTRADER_TOKEN_SERVICE_URL не задан (например, локальный
      # запуск без compose). На VPS сервис всегда поднят → этот файл не
      # используется.
      CTRADER_CLIENT_ID: ${CTRADER_CLIENT_ID:-}
      CTRADER_CLIENT_SECRET: ${CTRADER_CLIENT_SECRET:-}
      CTRADER_ACCOUNT_ID: ${CTRADER_ACCOUNT_ID:-0}
      CTRADER_HOST_TYPE: ${CTRADER_HOST_TYPE:-demo}
      AI_FX_TRADER_CTRADER_TOKEN_PATH: ${AI_FX_TRADER_CTRADER_TOKEN_PATH:-/data/ctrader_tokens.json}
      # DeepSeek-V4 (тот же ключ что у ai_trader — это аккаунт-level rate-limit).
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      AI_FX_TRADER_DEEPSEEK_MODEL: ${AI_FX_TRADER_DEEPSEEK_MODEL:-deepseek-v4-flash}
      AI_FX_TRADER_DEEPSEEK_BASE_URL: ${AI_FX_TRADER_DEEPSEEK_BASE_URL:-https://api.deepseek.com/anthropic}
      AI_FX_TRADER_DEEPSEEK_THINKING: ${AI_FX_TRADER_DEEPSEEK_THINKING:-true}
      # 8192 — hard cap у DeepSeek Anthropic-compat. С 4096 наблюдался
      # out=4096 и оборванный JSON: thinking-блок + sentiment-блок
      # (multi-dim: 5 measures × N items) + decision = ~5–7k токенов
      # суммарно. Регрессия 2026-05-18: лимит был ошибочно установлен
      # 4096, появилась ошибка «not a decision dict (missing 'action')»
      # — последний balanced JSON в обрубке = sentiment, без action.
      AI_FX_TRADER_DEEPSEEK_MAX_TOKENS: ${AI_FX_TRADER_DEEPSEEK_MAX_TOKENS:-8192}
      # News: RSS (ForexLive/Investing/OilPrice/Kitco) + EIA Open Data API.
      # EIA API key опционален: пустой ключ → EIA-блок отключён, RSS остаётся.
      AI_FX_TRADER_NEWS_ENABLED: ${AI_FX_TRADER_NEWS_ENABLED:-true}
      AI_FX_TRADER_NEWS_MAX_AGE_HOURS: ${AI_FX_TRADER_NEWS_MAX_AGE_HOURS:-12}
      AI_FX_TRADER_NEWS_MAX_ITEMS_PER_SYMBOL: ${AI_FX_TRADER_NEWS_MAX_ITEMS_PER_SYMBOL:-5}
      AI_FX_TRADER_EIA_API_KEY: ${AI_FX_TRADER_EIA_API_KEY:-}
      AI_FX_TRADER_EIA_CACHE_TTL_SEC: ${AI_FX_TRADER_EIA_CACHE_TTL_SEC:-21600}
    volumes:
      # Шарим тот же data-volume, что и Advisor — fx_ai_trader.sqlite
      # живёт здесь рядом с stats.sqlite Advisor'а (разные filename, не
      # пересекаются). cTrader-токен — owned by ctrader-token-service,
      # бот его не пишет (см. fx_ai_trader/trading/token_lock.py).
      - ./data:/data

  # ─── scalp-bot: orderflow-скальпер Bybit (rule-based, без LLM) ──────────
  # Полностью изолирован от ai-trader/bybit-bot. Решения по микроструктуре
  # (CVD/дельта, стакан, funding, ликвидации) из Bybit public WS в реалтайме.
  scalp-bot:
    build:
      context: .
      dockerfile: Dockerfile.scalp-bot
    image: scalp-bot:local
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    env_file:
      - .env
    environment:
      SCALP_DATA_DIR: /data
      SCALP_LOG_LEVEL: ${SCALP_LOG_LEVEL:-INFO}
      # Хардкод-список используется только как fallback при сбое get_tickers,
      # если включён авто-селектор вселенной (ниже).
      SCALP_SYMBOLS: ${SCALP_SYMBOLS:-BTCUSDT,ETHUSDT,SOLUSDT}
      # Активные стратегии (CSV): sweep_fade + density_bounce (fade) +
      # density_break (momentum-пробой на сносе плотности, v0.8.0). Реальное
      # значение — из .env (env_file); тут дефолт для свежего деплоя.
      SCALP_ENABLED_STRATEGIES: ${SCALP_ENABLED_STRATEGIES:-sweep_fade,density_bounce,density_break}
      # Авто-селектор: бот сам выбирает монеты под стратегию из get_tickers
      # (композит range%/turnover/spread), берёт ВСЕ прошедшие фильтр и
      # пересматривает раз в 5 мин (ротация — no-op если состав не сменился).
      # Пороги привязаны к fee-guard и live-границе (BUILDLOG_SCALP) — не подгонка.
      SCALP_AUTO_UNIVERSE_ENABLED: ${SCALP_AUTO_UNIVERSE_ENABLED:-true}
      # safety-кап на число WS-подписок; берём ВСЕ прошедшие фильтр (≤0=без лимита)
      SCALP_UNIVERSE_TOP_N: ${SCALP_UNIVERSE_TOP_N:-15}
      SCALP_UNIVERSE_REFRESH_SEC: ${SCALP_UNIVERSE_REFRESH_SEC:-300}
      # 150M→100M (v0.8.2): рынок просел ~2×, floor $150M выкидывал рабочие
      # NEAR/ZEC; страж ликвидности = spread cap. Range-cap 30% (анти-памп) оставлен.
      SCALP_UNIVERSE_MIN_TURNOVER_USD: ${SCALP_UNIVERSE_MIN_TURNOVER_USD:-100000000}
      # Пины: v0.12.0 (канон-ревизия) — пусто. Убран ALLO: канон «избегать pump/
      # dump» (Volity/stoic.ai/dev.to). Пин был ручной override в обход фильтра.
      SCALP_UNIVERSE_PIN_SYMBOLS: ${SCALP_UNIVERSE_PIN_SYMBOLS:-}
      # density (v0.8.3): wall 8×→5× (8× недостижим на top-25 Bybit, density не
      # срабатывала — 0 сделок) + round-band 0.1%→0.3% (был слишком жёсткий гейт).
      SCALP_DENSITY_WALL_MULT: ${SCALP_DENSITY_WALL_MULT:-5.0}
      SCALP_DENSITY_ROUND_FRAC: ${SCALP_DENSITY_ROUND_FRAC:-0.003}
      # Rolling-baseline (v0.9.0): стена vs скользящее среднее за 10–15мин (Kalena),
      # а не мгновенный top-25 (тот давал 0/502 входов — 5× недостижим).
      SCALP_DENSITY_BASELINE_SEC: ${SCALP_DENSITY_BASELINE_SEC:-900}
      SCALP_DENSITY_BASELINE_MIN_SAMPLES: ${SCALP_DENSITY_BASELINE_MIN_SAMPLES:-30}
      SCALP_UNIVERSE_MIN_RANGE_PCT: ${SCALP_UNIVERSE_MIN_RANGE_PCT:-6}
      # v0.12.0: 30→20 — канон «>20%/день = манипуляция» (stoic.ai 2026).
      SCALP_UNIVERSE_MAX_RANGE_PCT: ${SCALP_UNIVERSE_MAX_RANGE_PCT:-20}
      SCALP_UNIVERSE_MAX_SPREAD_BPS: ${SCALP_UNIVERSE_MAX_SPREAD_BPS:-5}
      # Bybit — ОТДЕЛЬНЫЕ ключи (или те же что ai-trader/bybit-bot, но
      # рекомендуется отдельный subaccount для аудита PnL).
      SCALP_BYBIT_API_KEY: ${SCALP_BYBIT_API_KEY:-}
      SCALP_BYBIT_API_SECRET: ${SCALP_BYBIT_API_SECRET:-}
      SCALP_BYBIT_DEMO: ${SCALP_BYBIT_DEMO:-true}
      SCALP_BYBIT_CATEGORY: ${SCALP_BYBIT_CATEGORY:-linear}
      # LIVE на demo по умолчанию (демо-счёт, риска нет). Нужны ключи
      # SCALP_BYBIT_API_KEY/SECRET. false = PAPER (симуляция, опционально).
      SCALP_TRADING_ENABLED: ${SCALP_TRADING_ENABLED:-true}
      SCALP_ENTRY_ORDER_TYPE: ${SCALP_ENTRY_ORDER_TYPE:-post_only_limit}
      # Капитал/лот: депо $1000, лот $100 (минимум $10 — иначе комиссия
      # съедает прибыль скальпа).
      SCALP_VIRTUAL_CAPITAL: ${SCALP_VIRTUAL_CAPITAL:-1000}
      SCALP_POSITION_USD: ${SCALP_POSITION_USD:-100}
      SCALP_MIN_POSITION_USD: ${SCALP_MIN_POSITION_USD:-10}
      SCALP_MAX_LEVERAGE: ${SCALP_MAX_LEVERAGE:-5}
      SCALP_MAX_DAILY_LOSS_USD: ${SCALP_MAX_DAILY_LOSS_USD:-500}
      SCALP_MAX_TOTAL_LOSS_USD: ${SCALP_MAX_TOTAL_LOSS_USD:-800}
      SCALP_MAX_OPEN_POSITIONS: ${SCALP_MAX_OPEN_POSITIONS:-2}
      # 20→5/ч (v0.10.0): анти-overtrade. Канон 3–12 сигналов/день; у нас было
      # ~17/ч у кэпа при gross edge ≈0 (402 сделки/24ч → −$60).
      SCALP_MAX_TRADES_PER_HOUR: ${SCALP_MAX_TRADES_PER_HOUR:-5}
      # Сигналы (research-based дефолты — см. settings.py / BUILDLOG_SCALP.md)
      # Аудит v0.9.0: MIN_CONFLUENCE / FUNDING_EXTREME / LIQ_FLUSH_USD удалены —
      # legacy-скоринг и factor-noise (funding/liq = 0.2% входов, не каноничны).
      SCALP_OB_IMBALANCE_MIN: ${SCALP_OB_IMBALANCE_MIN:-0.58}
      # ob_imb СНОВА обязателен (v0.10.0, score≥5): score=5 (ob есть) gross
      # +0.11R vs score=4 (ob нет, 73% объёма) gross 0.00R — торгуем только
      # где edge доказан (реверс v0.7.0-бонуса по данным 402 сделок).
      SCALP_REQUIRE_OB_IMBALANCE: ${SCALP_REQUIRE_OB_IMBALANCE:-true}
      # ТФ-выравнивание (v0.11.0): reclaim подтверждаем на ЗАКРЫТИИ 1м-бара
      # (не на тиковом проколе) — холд стал 3-4мин, цель 5-15м, а триггер был 30с.
      # arm_timeout 60→120с: дать ≥2 закрытия бара на подтверждение. 0 = тик-режим.
      SCALP_CONFIRM_BAR_SEC: ${SCALP_CONFIRM_BAR_SEC:-60}
      SCALP_ARM_TIMEOUT_SEC: ${SCALP_ARM_TIMEOUT_SEC:-120}
      # Философия B: дай победителю бежать. TP 3.5R (асимметричный payoff).
      # v0.9.5: time_stop УДАЛЁН (противоречил «дай бежать» — резал по таймеру);
      # выход только flow_exit/flow_scratch/биржевой TP/SL.
      SCALP_TAKE_PROFIT_R: ${SCALP_TAKE_PROFIT_R:-3.5}
      # Анти-клиппинг (v0.7.1): flow_exit фиксирует по развороту ленты только
      # после ≥1R прибыли (был копеечный порог ≥комиссии → клипал вины, обнулял TP).
      SCALP_FLOW_EXIT_ACTIVATE_R: ${SCALP_FLOW_EXIT_ACTIVATE_R:-1.0}
      # Порог глубины flow_scratch (v0.9.2): режем убыток только при ≥0.7R против
      # (был hair-trigger «≥комиссии» → 40% входов в минус). Симметрия с flow_exit.
      SCALP_SCRATCH_MIN_ADVERSE_R: ${SCALP_SCRATCH_MIN_ADVERSE_R:-0.7}
      # HTF-bias (v0.9.3): фейд только по тренду EMA200 1H (CAP-контекст,
      # Murphy/Asness). Контртренд блокируем; fail-open при сбое свечей.
      SCALP_REQUIRE_HTF_TREND: ${SCALP_REQUIRE_HTF_TREND:-true}
      SCALP_HTF_INTERVAL: ${SCALP_HTF_INTERVAL:-60}
      SCALP_HTF_EMA_LEN: ${SCALP_HTF_EMA_LEN:-200}
      SCALP_HTF_REFRESH_SEC: ${SCALP_HTF_REFRESH_SEC:-300}
      # Мин-R пол + риск-сайзинг (v0.8.1): R ≥ 4×fee → fee ≤ 0.25R (R≈0.44%),
      # размер = риск$/дистанция_SL (канон профи), фикс $-риск/сделку.
      SCALP_MIN_RISK_FEE_MULT: ${SCALP_MIN_RISK_FEE_MULT:-4.0}
      SCALP_RISK_BASED_SIZING: ${SCALP_RISK_BASED_SIZING:-true}
      SCALP_RISK_PER_TRADE_USD: ${SCALP_RISK_PER_TRADE_USD:-1.0}
      # Telegram-нотификации (переиспользуем отдельного бота от ai_arena).
      SCALP_TELEGRAM_ENABLED: ${SCALP_TELEGRAM_ENABLED:-false}
      SCALP_TELEGRAM_BOT_TOKEN: ${SCALP_TELEGRAM_BOT_TOKEN:-}
      SCALP_TELEGRAM_CHAT_ID: ${SCALP_TELEGRAM_CHAT_ID:-}
    volumes:
      - scalp_bot_data:/data

volumes:
  ai_trader_data:
  scalp_bot_data:
