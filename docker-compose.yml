services:
  advisor:
    build: .
    image: fx-pro-bot:local
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      YFINANCE_INTERVAL: ${YFINANCE_INTERVAL:-5m}
      YFINANCE_PERIOD: ${YFINANCE_PERIOD:-1mo}
      POLL_INTERVAL_SEC: ${POLL_INTERVAL_SEC:-300}
      VERIFY_HORIZONS: ${VERIFY_HORIZONS:-15,30,60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FXPRO_ENABLED: ${FXPRO_ENABLED:-false}
      FXPRO_CLIENT_ID: ${FXPRO_CLIENT_ID:-}
      FXPRO_CLIENT_SECRET: ${FXPRO_CLIENT_SECRET:-}
      FXPRO_ACCOUNT_ID: ${FXPRO_ACCOUNT_ID:-}
      FXPRO_API_URL: ${FXPRO_API_URL:-https://connect.fxpro.com/api/v1}
      CTRADER_TRADING_ENABLED: ${CTRADER_TRADING_ENABLED:-false}
      CTRADER_HOST_TYPE: ${CTRADER_HOST_TYPE:-demo}
      CTRADER_CLIENT_ID: ${CTRADER_CLIENT_ID:-}
      CTRADER_CLIENT_SECRET: ${CTRADER_CLIENT_SECRET:-}
      CTRADER_ACCOUNT_ID: ${CTRADER_ACCOUNT_ID:-0}
      CTRADER_REDIRECT_URI: ${CTRADER_REDIRECT_URI:-https://openapi.ctrader.com/apps/token}
      OUTSIDERS_MODE: ${OUTSIDERS_MODE:-confirmed}
      # Флаги стратегий (defaults = совместимость; реальное значение — в .env)
      LEADERS_ENABLED: ${LEADERS_ENABLED:-true}
      OUTSIDERS_ENABLED: ${OUTSIDERS_ENABLED:-true}
      ENSEMBLE_ENABLED: ${ENSEMBLE_ENABLED:-true}
      SCALPING_GOLD_ORB_ENABLED: ${SCALPING_GOLD_ORB_ENABLED:-true}
      SCALPING_GOLD_ORB_SHADOW: ${SCALPING_GOLD_ORB_SHADOW:-true}
      SCALPING_MAX_POSITIONS: ${SCALPING_MAX_POSITIONS:-50}
      KILLSWITCH_MAX_DAILY_LOSS: ${KILLSWITCH_MAX_DAILY_LOSS:-50.0}
      KILLSWITCH_MAX_DRAWDOWN_PCT: ${KILLSWITCH_MAX_DRAWDOWN_PCT:-20.0}
      KILLSWITCH_MAX_POSITIONS: ${KILLSWITCH_MAX_POSITIONS:-10}
      KILLSWITCH_MAX_LOSS_PER_TRADE: ${KILLSWITCH_MAX_LOSS_PER_TRADE:-25.0}
    volumes:
      - ./data:/data

  bybit-bot:
    build:
      context: .
      dockerfile: Dockerfile.bybit
    image: bybit-bot:local
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    env_file:
      - .env
    environment:
      BYBIT_BOT_DATA_DIR: /data
      # AB-test snapshot БД хранится вне docker volume, в хостовой папке
      # /root/fx-pro-bot-data (bind mount ниже). Рестарт контейнера и
      # docker volume rm не трогают этот файл.
      AB_SNAPSHOTS_DB_PATH: /ab-data/ab_snapshots.sqlite
      # После backtest 90д / 9K сделок (см. BUILDLOG_BYBIT.md 2026-04-23):
      # 5 страт (VWAP/StatArb/Volume/Turtle/LeadLag) подтверждённо убыточны
      # на истории (PnL от -49% до -280%). Код не удалён — только флаг.
      # ORB оставляем, но с жёсткими whitelist-ами: London-session / long /
      # SOL-LINK-BNB — единственный прибыльный срез (PF 1.53, +7.18% на n=54).
      # VWAP (Wave 6, BUILDLOG.md 2026-04-25). Data-driven whitelist по
      # Bybit API n=636 (2026-04-11..23) и 90d backtest (n=126 в выбранном
      # сегменте, OOS TEST PF=1.26 +w%=80%). Включена по умолчанию с
      # фильтрами: long / 5 символов / часы 14-16,19-20 UTC / будни.
      BYBIT_BOT_SCALP_VWAP_ENABLED: ${BYBIT_BOT_SCALP_VWAP_ENABLED:-true}
      BYBIT_BOT_SCALP_VWAP_DIRECTION: ${BYBIT_BOT_SCALP_VWAP_DIRECTION:-long}
      BYBIT_BOT_SCALP_VWAP_SYMBOLS: ${BYBIT_BOT_SCALP_VWAP_SYMBOLS:-ADAUSDT,SOLUSDT,SUIUSDT,TONUSDT,WIFUSDT}
      BYBIT_BOT_SCALP_VWAP_HOURS_UTC: ${BYBIT_BOT_SCALP_VWAP_HOURS_UTC:-14,15,16,19,20}
      BYBIT_BOT_SCALP_VWAP_WEEKDAYS: ${BYBIT_BOT_SCALP_VWAP_WEEKDAYS:-mon,tue,wed,thu,fri}
      BYBIT_BOT_SCALP_STATARB_ENABLED: ${BYBIT_BOT_SCALP_STATARB_ENABLED:-false}
      BYBIT_BOT_SCALP_VOLUME_ENABLED: ${BYBIT_BOT_SCALP_VOLUME_ENABLED:-false}
      BYBIT_BOT_SCALP_ORB_ENABLED: ${BYBIT_BOT_SCALP_ORB_ENABLED:-true}
      BYBIT_BOT_SCALP_ORB_SESSIONS: ${BYBIT_BOT_SCALP_ORB_SESSIONS:-london}
      BYBIT_BOT_SCALP_ORB_SYMBOLS: ${BYBIT_BOT_SCALP_ORB_SYMBOLS:-SOLUSDT,LINKUSDT,BNBUSDT}
      BYBIT_BOT_SCALP_ORB_DIRECTION: ${BYBIT_BOT_SCALP_ORB_DIRECTION:-long}
      BYBIT_BOT_SCALP_TURTLE_ENABLED: ${BYBIT_BOT_SCALP_TURTLE_ENABLED:-false}
      BYBIT_BOT_SCALP_LEADLAG_ENABLED: ${BYBIT_BOT_SCALP_LEADLAG_ENABLED:-false}
      BYBIT_BOT_LEADLAG_REF_SYMBOL: ${BYBIT_BOT_LEADLAG_REF_SYMBOL:-BTCUSDT}
      # Crypto Overbought Fader (COF) — новая ансамблевая страта (Variant E).
      # Pattern-mining 90д истории: DUO turtle+vwap × NY × RSI≥65 × ATR%≥0.3
      # даёт PF 1.98 (OOS PF 2.05), 69% прибыльных недель. См. BUILDLOG_BYBIT.md
      # 2026-04-23 «COF research» и `crypto_overbought_fader.py`.
      # Деплоим выключенной — включение требует ручного подтверждения.
      BYBIT_BOT_SCALP_COF_ENABLED: ${BYBIT_BOT_SCALP_COF_ENABLED:-false}
      BYBIT_BOT_SCALP_COF_SYMBOLS: ${BYBIT_BOT_SCALP_COF_SYMBOLS:-}
      # Verbose-режим: включает DEBUG-логи ТОЛЬКО для crypto_overbought_fader
      # (какой фильтр отсёк сигнал). Временный флаг для отладки, обычно false.
      BYBIT_BOT_SCALP_COF_VERBOSE: ${BYBIT_BOT_SCALP_COF_VERBOSE:-false}
      # KillSwitch: на demo отключаем (demo equity $177k, 25% drawdown = $45k
      # триггерится от шума). На реале (account $500) включать обязательно.
      BYBIT_BOT_KS_ENABLED: ${BYBIT_BOT_KS_ENABLED:-true}
    volumes:
      - bybit_data:/data
      - /root/fx-pro-bot-data:/ab-data

volumes:
  bybit_data:
