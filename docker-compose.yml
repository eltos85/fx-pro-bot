services:
  advisor:
    build: .
    image: fx-pro-bot:local
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      DATA_DIR: /data
      YFINANCE_INTERVAL: ${YFINANCE_INTERVAL:-5m}
      YFINANCE_PERIOD: ${YFINANCE_PERIOD:-5d}
      POLL_INTERVAL_SEC: ${POLL_INTERVAL_SEC:-300}
      VERIFY_HORIZONS: ${VERIFY_HORIZONS:-15,30,60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FXPRO_ENABLED: ${FXPRO_ENABLED:-false}
      FXPRO_CLIENT_ID: ${FXPRO_CLIENT_ID:-}
      FXPRO_CLIENT_SECRET: ${FXPRO_CLIENT_SECRET:-}
      FXPRO_ACCOUNT_ID: ${FXPRO_ACCOUNT_ID:-}
      FXPRO_API_URL: ${FXPRO_API_URL:-https://connect.fxpro.com/api/v1}
      CTRADER_TRADING_ENABLED: ${CTRADER_TRADING_ENABLED:-false}
      CTRADER_HOST_TYPE: ${CTRADER_HOST_TYPE:-demo}
      CTRADER_CLIENT_ID: ${CTRADER_CLIENT_ID:-}
      CTRADER_CLIENT_SECRET: ${CTRADER_CLIENT_SECRET:-}
      CTRADER_ACCOUNT_ID: ${CTRADER_ACCOUNT_ID:-0}
      CTRADER_REDIRECT_URI: ${CTRADER_REDIRECT_URI:-https://openapi.ctrader.com/apps/token}
      OUTSIDERS_MODE: ${OUTSIDERS_MODE:-classic}
      SCALPING_VWAP_ENABLED: ${SCALPING_VWAP_ENABLED:-true}
      SCALPING_STATARB_ENABLED: ${SCALPING_STATARB_ENABLED:-true}
      SCALPING_ORB_ENABLED: ${SCALPING_ORB_ENABLED:-true}
      SCALPING_MAX_POSITIONS: ${SCALPING_MAX_POSITIONS:-50}
      KILLSWITCH_MAX_DAILY_LOSS: ${KILLSWITCH_MAX_DAILY_LOSS:-50.0}
      KILLSWITCH_MAX_DRAWDOWN_PCT: ${KILLSWITCH_MAX_DRAWDOWN_PCT:-20.0}
      KILLSWITCH_MAX_POSITIONS: ${KILLSWITCH_MAX_POSITIONS:-10}
      KILLSWITCH_MAX_LOSS_PER_TRADE: ${KILLSWITCH_MAX_LOSS_PER_TRADE:-25.0}
    volumes:
      - ./data:/data

  bybit-bot:
    build:
      context: .
      dockerfile: Dockerfile.bybit
    image: bybit-bot:local
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      BYBIT_BOT_DATA_DIR: /data
      BYBIT_BOT_API_KEY: ${BYBIT_BOT_API_KEY:-}
      BYBIT_BOT_API_SECRET: ${BYBIT_BOT_API_SECRET:-}
      BYBIT_BOT_DEMO: ${BYBIT_BOT_DEMO:-true}
      BYBIT_BOT_TRADING_ENABLED: ${BYBIT_BOT_TRADING_ENABLED:-false}
      BYBIT_BOT_CATEGORY: ${BYBIT_BOT_CATEGORY:-linear}
      BYBIT_BOT_SCAN_SYMBOLS: ${BYBIT_BOT_SCAN_SYMBOLS:-BTCUSDT,ETHUSDT,SOLUSDT,XRPUSDT,DOGEUSDT,ADAUSDT,LINKUSDT,AVAXUSDT}
      BYBIT_BOT_YFINANCE_PERIOD: ${BYBIT_BOT_YFINANCE_PERIOD:-5d}
      BYBIT_BOT_YFINANCE_INTERVAL: ${BYBIT_BOT_YFINANCE_INTERVAL:-5m}
      BYBIT_BOT_POLL_INTERVAL_SEC: ${BYBIT_BOT_POLL_INTERVAL_SEC:-300}
      BYBIT_BOT_ACCOUNT_BALANCE: ${BYBIT_BOT_ACCOUNT_BALANCE:-1000}
      BYBIT_BOT_LEVERAGE: ${BYBIT_BOT_LEVERAGE:-1}
      BYBIT_BOT_CAPITAL_PER_TRADE_PCT: ${BYBIT_BOT_CAPITAL_PER_TRADE_PCT:-0.05}
      BYBIT_BOT_MAX_POSITIONS: ${BYBIT_BOT_MAX_POSITIONS:-10}
      BYBIT_BOT_MIN_VOTES: ${BYBIT_BOT_MIN_VOTES:-3}
      BYBIT_BOT_KS_MAX_DAILY_LOSS: ${BYBIT_BOT_KS_MAX_DAILY_LOSS:-37.50}
      BYBIT_BOT_KS_MAX_DRAWDOWN_PCT: ${BYBIT_BOT_KS_MAX_DRAWDOWN_PCT:-25.0}
      BYBIT_BOT_KS_MAX_POSITIONS: ${BYBIT_BOT_KS_MAX_POSITIONS:-5}
      BYBIT_BOT_KS_MAX_LOSS_PER_TRADE: ${BYBIT_BOT_KS_MAX_LOSS_PER_TRADE:-12.50}
      BYBIT_BOT_LOG_LEVEL: ${BYBIT_BOT_LOG_LEVEL:-INFO}
    volumes:
      - bybit_data:/data

volumes:
  bybit_data:
