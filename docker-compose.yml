services:
  advisor:
    build: .
    image: fx-pro-bot:local
    environment:
      DATA_DIR: /data
      DATA_SOURCE: ${DATA_SOURCE:-stub}
      YFINANCE_SYMBOL: ${YFINANCE_SYMBOL:-EURUSD=X}
      DISPLAY_NAME: ${DISPLAY_NAME:-EUR/USD}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    # Именованный том: статистика и календарь не зависят от пересборки образа (docker compose build).
    # Не используйте `docker compose down -v`, если нужно сохранить данные — эта опция удаляет тома.
    volumes:
      - advisor_data:/data

volumes:
  advisor_data:
